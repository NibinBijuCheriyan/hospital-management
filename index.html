<!DOCTYPE html>
<html>
<head>
    <title>Hospital Appointment System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🏥 MedCare</h1>
    <p>Book Appointments Easily</p>
</header>

<div class="container">

    <div class="card">
        <h2>👤 Register Patient</h2>
        <form id="patientForm">
            <input type="text" placeholder="Full Name" id="pname" required>
            <input type="number" placeholder="Age" id="page" required>
            <input type="text" placeholder="Gender" id="pgender" required>
            <input type="text" placeholder="Phone Number" id="pphone" required>
            <input type="email" placeholder="Email Address" id="pemail" required>
            <button type="submit">Register</button>
        </form>
    </div>

    <div class="card">
        <h2>📅 Book Appointment</h2>
        <form id="appointmentForm">
            <input type="number" placeholder="Patient ID" id="pid" required>
            <input type="number" placeholder="Doctor ID" id="did" required>
            <input type="date" id="date" required>
            <input type="time" id="time" required>
            <button type="submit">Book Appointment</button>
        </form>
    </div>

</div>

<footer>
    <p>© 2026 MedCare Hospital</p>
</footer>

<script src="script.js"></script>
</body>
</html>
